<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chart Preview</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .title {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 600;
        color: #0f172a;
      }
      .wrap {
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
      img {
        max-width: 100%;
        height: auto;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
      }
      .empty {
        color: #64748b;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1 id="title" class="title">Chart Preview</h1>
    <div id="content" class="wrap"></div>
    <script>
      (function () {
        try {
          const params = new URLSearchParams(window.location.search);
          const key = params.get("key");
          const content = document.getElementById("content");
          const titleEl = document.getElementById("title");
          if (!key) {
            content.innerHTML = '<div class="empty">No preview key provided.</div>';
            return;
          }

          const raw = localStorage.getItem(key);
          if (!raw) {
            content.innerHTML = '<div class="empty">Preview data not found or expired.</div>';
            return;
          }

          const payload = JSON.parse(raw);
          localStorage.removeItem(key);

          const title = payload && payload.title ? String(payload.title) : "Chart Preview";
          const img = payload && payload.img ? String(payload.img) : "";
          titleEl.textContent = title;

          if (!img) {
            content.innerHTML = '<div class="empty">Preview image is empty.</div>';
            return;
          }

          const el = document.createElement("img");
          el.alt = "chart-preview";
          el.src = img;
          content.appendChild(el);
        } catch (e) {
          const content = document.getElementById("content");
          if (content) {
            content.innerHTML = '<div class="empty">Failed to load preview.</div>';
          }
        }
      })();
    </script>
  </body>
</html>
