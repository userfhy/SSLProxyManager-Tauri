<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chart Preview</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0b1220;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .page {
        height: 100%;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        padding: 12px;
        gap: 10px;
      }
      .title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .auto-group {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #cbd5e1;
      }
      .auto-group input[type="number"] {
        width: 64px;
        height: 28px;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 0 8px;
        outline: none;
        color: #e2e8f0;
        background: #0f172a;
      }
      .refresh-btn {
        border: 1px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        height: 30px;
        padding: 0 12px;
        cursor: pointer;
      }
      .refresh-btn:hover {
        background: #1e293b;
      }
      .refresh-btn:disabled {
        cursor: not-allowed;
        color: #64748b;
        background: #0b1220;
      }
      .status {
        font-size: 12px;
        color: #94a3b8;
      }
      .chart-wrap {
        flex: 1;
        min-height: 0;
        border: 1px solid #334155;
        border-radius: 10px;
        background: #0f172a;
        overflow: hidden;
      }
      #chart {
        width: 100%;
        height: 100%;
      }
      .empty {
        display: grid;
        place-items: center;
        height: 100%;
        color: #94a3b8;
        font-size: 14px;
      }
      .light-mode body {
        background: #f8fafc;
        color: #0f172a;
      }
      .light-mode .auto-group {
        color: #334155;
      }
      .light-mode .auto-group input[type="number"] {
        border: 1px solid #cfd8e6;
        color: #0f172a;
        background: #ffffff;
      }
      .light-mode .refresh-btn {
        border: 1px solid #cfd8e6;
        background: #ffffff;
        color: #0f172a;
      }
      .light-mode .refresh-btn:hover {
        background: #f1f5f9;
      }
      .light-mode .refresh-btn:disabled {
        color: #94a3b8;
        background: #f8fafc;
      }
      .light-mode .status {
        color: #64748b;
      }
      .light-mode .chart-wrap {
        border: 1px solid #dbe3f0;
        background: #ffffff;
      }
      .light-mode .empty {
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="toolbar">
        <h1 id="title" class="title">Chart Preview</h1>
        <div class="tools">
          <label class="auto-group" for="auto-refresh-toggle">
            <input id="auto-refresh-toggle" type="checkbox" />
            <span id="auto-refresh-label">Auto Refresh</span>
          </label>
          <label class="auto-group" for="auto-refresh-seconds">
            <input id="auto-refresh-seconds" type="number" min="1" max="3600" step="1" value="10" />
            <span id="auto-refresh-seconds-label">sec</span>
          </label>
          <span id="refresh-status" class="status"></span>
          <button id="refresh-btn" class="refresh-btn" type="button">Refresh</button>
          <button id="export-png-btn" class="refresh-btn" type="button">Export PNG</button>
        </div>
      </div>
      <div class="chart-wrap">
        <div id="chart" class="empty">Loading preview...</div>
      </div>
    </div>
    <script type="module" src="/src/chart-preview-main.ts"></script>
  </body>
  </html>
