name: Manual Build (Single Platform)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Select one platform to build
        required: true
        type: choice
        default: windows-x64
        options:
          - windows-x64
          - linux-amd64
          - macos-arm64
          - macos-x64
      publish_release:
        description: Upload bundles to GitHub Release and replace existing assets
        required: true
        type: boolean
        default: true
      release_tag:
        description: Optional release tag (e.g. v1.0.18). Empty = use v<version from Cargo.toml>
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ inputs.platform }}
    runs-on: ${{ inputs.platform == 'windows-x64' && 'windows-latest' || inputs.platform == 'linux-amd64' && 'ubuntu-22.04' || 'macos-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve platform settings
        id: platform
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.platform }}" in
            windows-x64)
              echo "tauri_target=x86_64-pc-windows-msvc" >> "$GITHUB_OUTPUT"
              echo "tauri_args=--target x86_64-pc-windows-msvc --bundles nsis" >> "$GITHUB_OUTPUT"
              ;;
            linux-amd64)
              echo "tauri_target=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT"
              echo "tauri_args=--target x86_64-unknown-linux-gnu --bundles deb,appimage,rpm" >> "$GITHUB_OUTPUT"
              ;;
            macos-arm64)
              echo "tauri_target=aarch64-apple-darwin" >> "$GITHUB_OUTPUT"
              echo "tauri_args=--target aarch64-apple-darwin --bundles dmg" >> "$GITHUB_OUTPUT"
              ;;
            macos-x64)
              echo "tauri_target=x86_64-apple-darwin" >> "$GITHUB_OUTPUT"
              echo "tauri_args=--target x86_64-apple-darwin --bundles dmg" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported platform: ${{ inputs.platform }}"
              exit 1
              ;;
          esac

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ steps.platform.outputs.tauri_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: inputs.platform == 'linux-amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Tauri bundle
        run: npm run tauri:build -- ${{ steps.platform.outputs.tauri_args }}

      - name: Resolve release tag
        id: meta
        if: inputs.publish_release
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          else
            version="$(grep -m1 '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
            tag="v${version}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Using release tag: ${tag}"

      - name: Ensure release exists
        if: inputs.publish_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Manual single-platform build."
          fi

      - name: Upload bundles to release (replace existing assets)
        if: inputs.publish_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          bundle_dir="target/${{ steps.platform.outputs.tauri_target }}/release/bundle"
          if [ ! -d "$bundle_dir" ]; then
            echo "Bundle directory not found: $bundle_dir"
            exit 1
          fi

          case "${{ inputs.platform }}" in
            windows-x64)
              mapfile -t files < <(find "$bundle_dir" -type f \( -name "*.exe" -o -name "*.msi" \))
              ;;
            linux-amd64)
              mapfile -t files < <(find "$bundle_dir" -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.appimage" \))
              ;;
            macos-arm64|macos-x64)
              mapfile -t files < <(find "$bundle_dir" -type f \( -name "*.dmg" \))
              ;;
            *)
              echo "Unsupported platform for upload: ${{ inputs.platform }}"
              exit 1
              ;;
          esac

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No install bundle files found under: $bundle_dir"
            find "$bundle_dir" -type f
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Uploading (clobber): $f"
            gh release upload "$tag" "$f" --clobber
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: SSLProxyManager-${{ inputs.platform }}
          path: target/${{ steps.platform.outputs.tauri_target }}/release/bundle/**
          if-no-files-found: error
