name: Build (Windows + Linux + macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux-amd64
            tauri_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles deb,appimage,rpm
          - platform: windows-latest
            name: windows-x64
            tauri_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - platform: macos-latest
            name: macos-arm64
            tauri_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: macos-latest
            name: macos-x64
            tauri_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and upload with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          assetNamePattern: "[name]_[version]_[platform]_[arch][ext]"
          args: ${{ matrix.args }}

      - name: Upload artifacts (workflow)
        uses: actions/upload-artifact@v7
        with:
          name: SSLProxyManager-${{ matrix.name }}
          path: target/${{ matrix.tauri_target }}/release/bundle/**
          if-no-files-found: error
